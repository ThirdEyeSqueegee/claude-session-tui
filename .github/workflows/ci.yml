name: ci

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo. Least-privilege token for the whole workflow.
permissions:
  contents: read

# Cancel superseded runs on the same ref (PR pushes especially).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions are pinned to a major version (@vN); Dependabot bumps them.
      # eBPF egress blocking is Ubuntu-only, so we stay on audit (macOS can't
      # enforce block anyway).
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          # go.mod pins the version; setup-go installs exactly that. Single
          # source of truth — Dependabot bumps go.mod and CI follows.
          go-version-file: go.mod
          cache: true

      - name: gofmt gate
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with race detector
        # -race needs cgo + a C compiler; both runners ship one and CGO defaults
        # to 1, but set it explicitly so an env override can't silently break -race.
        env:
          CGO_ENABLED: "1"
        run: go test -race -shuffle=on ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # The lint action manages its own cache; avoid double-caching.
          cache: false

      # golangci-lint-action v9 runs golangci-lint v2.x and requires a v2-schema
      # .golangci.yml (top-level version: "2"). A v1 config fails to parse.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - name: Checkout
        uses: actions/checkout@v7

      # actionlint has no first-party action; fetch the pinned release binary.
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color
